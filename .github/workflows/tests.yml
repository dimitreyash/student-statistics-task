name: Tests

on:
  push:
    branches:
      - source

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Remove solution before publishing
        run: |
          rm -f src/solution.js

      - name: Publish to main branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout --orphan main
          git add .
          git commit -m "Publish task without solution"
          git push origin main --force